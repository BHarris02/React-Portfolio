name: Test

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    jest:
        name: Run Jest
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                node-version: '25'
                cache: 'npm'

            - name: Install deps
              run: npm ci

            - name: Run tests
              run: npm test -- --ci